  return '<div class="agent-layout"><div class="chat-container glass-card"><div class="chat-messages" id="chat-msgs">' + msgsHTML + '</div><div class="chat-input-area"><input class="chat-input" id="chat-inp" placeholder="Ask about your shared leads..." onkeydown="if(event.key===\'Enter\')sendChat()"><button class="btn btn-primary chat-send-btn" onclick="sendChat()">Send</button></div></div><div class="agent-sidebar"><div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128161; Quick Prompts</div></div><div class="prompts-list">' + pBtns + '</div></div><div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#129504; Capabilities</div></div><div class="caps-list">' + cHTML + '</div></div></div></div>';
}
function setPrompt(btn) { var i = document.getElementById('chat-inp'); if (i) { i.value = btn.textContent.trim(); i.focus(); } }
async function sendChat() {
  var inp = document.getElementById('chat-inp'); if (!inp || !inp.value.trim()) return;
  var msg = inp.value.trim(); inp.value = '';
  S.chatHistory.push({ role: 'user', text: msg }); S.agentTyping = true; renderApp();
  var sys = 'You are LeadHarvest AI Agent for a team. Shared database has ' + S.leads.length + ' leads across ' + S.sessions.length + ' sessions. Schema: ' + Object.keys(S.schema).join(', ') + '. Recent sessions: ' + JSON.stringify(S.sessions.slice(0, 3).map(function(s) { return { name: s.name, site: s.site, count: s.count }; })) + '. Sample leads: ' + JSON.stringify(S.leads.slice(0, 5).map(getLead));
  var conv = S.chatHistory.map(function(m) { return (m.role === 'ai' ? 'Assistant: ' : 'User: ') + m.text; }).join('\n');
  var r = await geminiAsync(conv, sys) || 'Could not get response. Check your API key in Settings.';
  S.chatHistory.push({ role: 'ai', text: r }); S.agentTyping = false; renderApp();
}

// ═══════════════════════════════════════════════
//  ANALYTICS PAGE
// ═══════════════════════════════════════════════
function pgAnalytics() {
  var bySrc = {}, byCat = {}, byCity = {}, byStatus = { verified: 0, pending: 0, cold: 0 };
  S.leads.forEach(function(r) { var l = getLead(r); var src = l.source_site || l.source || 'Unknown'; bySrc[src] = (bySrc[src] || 0) + 1; if (l.category) byCat[l.category] = (byCat[l.category] || 0) + 1; if (l.city) byCity[l.city] = (byCity[l.city] || 0) + 1; if (l.status) byStatus[l.status] = (byStatus[l.status] || 0) + 1; });
  var topSrc = Object.entries(bySrc).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 8);
  var topCat = Object.entries(byCat).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 8);
  var topCity = Object.entries(byCity).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 8);
  var maxSrc = topSrc[0] ? topSrc[0][1] : 1, maxCat = topCat[0] ? topCat[0][1] : 1, maxCity = topCity[0] ? topCity[0][1] : 1;
  var avgScore = S.leads.length ? Math.round(S.leads.reduce(function(a, r) { return a + (getLead(r).lead_score || 0); }, 0) / S.leads.length) : 0;
  var withEmail = S.leads.filter(function(r) { return getLead(r).email; }).length;
  var withPhone = S.leads.filter(function(r) { return getLead(r).phone; }).length;
  function barChart(entries, max, colorFn) { return entries.map(function(e) { var pct = Math.round(e[1] / max * 100); return '<div class="bar-row"><div class="bar-label">' + escA(e[0]) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (colorFn ? colorFn(e[0]) : 'var(--color-sky)') + '"></div></div><div class="bar-val">' + e[1] + '</div></div>'; }).join(''); }
  var timeline = S.sessions.slice(0, 6).map(function(s) { var site = SITES.find(function(x) { return x.name === s.site; }) || { color: '#8b92b8' }; return '<div class="timeline-item"><div class="timeline-dot" style="background:' + site.color + '"></div><div class="timeline-content"><div class="timeline-title">' + escA(s.name) + '</div><div class="timeline-meta">' + (s.count || 0) + ' leads &bull; ' + new Date(s.created_at || s.createdAt).toLocaleDateString('en-IN') + '</div></div><div class="timeline-count" style="color:' + site.color + '">+' + (s.count || 0) + '</div></div>'; }).join('');
  return '<div class="stat-row">'
    + mkStat('Total Leads', S.leads.length, '&#128101;', '--color-em', 'All team leads')
    + mkStat('Avg Score', avgScore, '&#127919;', '--color-sky', 'out of 100')
    + mkStat('Verified Rate', S.leads.length ? Math.round(byStatus.verified / S.leads.length * 100) + '%' : '0%', '&#10003;', '--color-vio', 'High quality')
    + mkStat('With Email', withEmail, '&#9993;', '--color-am', 'Contactable')
    + '</div>'
    + '<div class="analytics-grid">'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128202; By Source</div></div><div class="cb bar-chart-wrap">' + (topSrc.length ? barChart(topSrc, maxSrc, function(s) { var site = SITES.find(function(x) { return x.name === s; }); return site ? site.color : 'var(--color-sky)'; }) : '<div class="empty-state-sm">No data</div>') + '</div></div>'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#127981; By Category</div></div><div class="cb bar-chart-wrap">' + (topCat.length ? barChart(topCat, maxCat, function() { return 'var(--color-vio)'; }) : '<div class="empty-state-sm">No data</div>') + '</div></div>'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128205; By City</div></div><div class="cb bar-chart-wrap">' + (topCity.length ? barChart(topCity, maxCity, function() { return 'var(--color-teal)'; }) : '<div class="empty-state-sm">No data</div>') + '</div></div>'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128200; Status &amp; Quality</div></div><div class="cb"><div class="donut-stats"><div class="donut-item"><div class="donut-swatch" style="background:var(--color-em)"></div><span>Verified</span><strong>' + byStatus.verified + '</strong></div><div class="donut-item"><div class="donut-swatch" style="background:var(--color-am)"></div><span>Pending</span><strong>' + byStatus.pending + '</strong></div><div class="donut-item"><div class="donut-swatch" style="background:var(--color-mu2)"></div><span>Cold</span><strong>' + byStatus.cold + '</strong></div></div><div class="data-quality-section"><div class="dq-title">Data Quality</div><div class="dq-row"><span>Has phone</span><div class="dq-bar"><div style="width:' + Math.round(withPhone / Math.max(1, S.leads.length) * 100) + '%;background:var(--color-em);height:100%;border-radius:3px"></div></div><span>' + withPhone + '</span></div><div class="dq-row"><span>Has email</span><div class="dq-bar"><div style="width:' + Math.round(withEmail / Math.max(1, S.leads.length) * 100) + '%;background:var(--color-sky);height:100%;border-radius:3px"></div></div><span>' + withEmail + '</span></div></div></div></div>'
    + '</div>'
    + (S.sessions.length ? '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128337; Session Timeline</div></div><div class="cb timeline-wrap">' + timeline + '</div></div>' : '');
}

// ═══════════════════════════════════════════════
//  EXPORT PAGE
// ═══════════════════════════════════════════════
function pgExport() {
  var sk = Object.keys(S.schema);
  var stOpts = ['all', 'verified', 'pending', 'cold'].map(function(v) { return '<option value="' + v + '">' + (v === 'all' ? 'All Statuses' : v.charAt(0).toUpperCase() + v.slice(1)) + ' (' + (v === 'all' ? S.leads.length : S.leads.filter(function(r) { return getLead(r).status === v; }).length) + ')</option>'; }).join('');
  var srcOpts = '<option value="">All Sources</option>' + SITES.map(function(s) { return '<option value="' + s.name + '">' + s.name + '</option>'; }).join('');
  var sessOpts = '<option value="">All Sessions</option>' + S.sessions.map(function(s) { return '<option value="' + s.id + '">' + escA(s.name) + '</option>'; }).join('');
  var colRows = sk.length ? sk.map(function(k, i) { var v = S.schema[k]; return '<tr><td class="td-num">' + (i + 1) + '</td><td><code class="field-name">' + k + '</code></td><td><span class="type-badge">' + v.type + '</span></td><td class="td-text mu">' + Math.round(v.count / Math.max(1, S.leads.length) * 100) + '%</td></tr>'; }).join('') : '<tr><td colspan="4" class="empty-cell">No schema yet</td></tr>';
  return '<div class="export-layout"><div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128229; Export Options</div></div><div class="cb export-form"><div class="export-info-box">CSV uses <strong>dynamic columns</strong> — all ' + sk.length + ' schema fields auto-included. Columns grow as new data is scraped.</div><div class="opt-group"><label class="opt-label">Filter by Status</label><select class="opt-select" id="exp-status" onchange="updateExportPreview()">' + stOpts + '</select></div><div class="opt-group"><label class="opt-label">Filter by Source</label><select class="opt-select" id="exp-source" onchange="updateExportPreview()">' + srcOpts + '</select></div><div class="opt-group"><label class="opt-label">Filter by Session</label><select class="opt-select" id="exp-session" onchange="updateExportPreview()">' + sessOpts + '</select></div><div class="opt-group"><label class="opt-label">Min Lead Score: <span id="exp-sv">0</span></label><input type="range" class="range-input" id="exp-score" min="0" max="100" value="0" oninput="document.getElementById(\'exp-sv\').textContent=this.value;updateExportPreview()"></div><div id="exp-preview" class="export-preview"></div><button class="btn btn-primary export-btn" onclick="doExport()">&#8659; Download CSV</button><button class="btn btn-outline export-btn" onclick="exportCSV(S.leads,\'all_leads_' + new Date().toISOString().slice(0, 10) + '\')">&#8659; Export Everything</button></div></div><div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#129518; Schema &rarr; CSV Columns (' + sk.length + ')</div></div><div class="table-wrap" style="max-height:500px;overflow-y:auto"><table class="data-table"><thead><tr><th>#</th><th>Column</th><th>Type</th><th>Coverage</th></tr></thead><tbody>' + colRows + '</tbody></table></div></div></div>';
}

function getExportRows() {
  var st = (document.getElementById('exp-status') || {}).value || 'all';
  var src = (document.getElementById('exp-source') || {}).value || '';
  var sess = (document.getElementById('exp-session') || {}).value || '';
  var mn = +((document.getElementById('exp-score') || {}).value || 0);
  return S.leads.filter(function(r) { var l = getLead(r); if (st !== 'all' && l.status !== st) return false; if (src && l.source_site !== src && l.source !== src) return false; if (sess && (r.session_id || l._session) !== sess) return false; if ((l.lead_score || 0) < mn) return false; return true; });
}
function updateExportPreview() { var el = document.getElementById('exp-preview'); if (el) { var rows = getExportRows(); el.innerHTML = '<strong>' + rows.length + '</strong> leads &times; <strong>' + Object.keys(S.schema).length + '</strong> columns'; } }
function doExport() { exportCSV(getExportRows(), 'leadharvest_' + new Date().toISOString().slice(0, 10)); }

// ═══════════════════════════════════════════════
//  CAMPAIGNS PAGE
// ═══════════════════════════════════════════════
function pgCampaigns() {
  var cList = [{ name: 'Electronics Outreach', sent: 124, opened: 47, replied: 12, rate: '38%', status: 'Active', c: 'var(--color-em)' }, { name: 'IT Services Follow-up', sent: 89, opened: 31, replied: 8, rate: '35%', status: 'Paused', c: 'var(--color-am)' }, { name: 'Pharma Intro Email', sent: 56, opened: 22, replied: 5, rate: '39%', status: 'Done', c: 'var(--color-mu2)' }];
  var cards = cList.map(function(c) { return '<div class="campaign-card glass-card"><div class="campaign-header"><div class="campaign-name">' + c.name + '</div><span class="campaign-status" style="background:' + c.c + '1a;color:' + c.c + '">' + c.status + '</span></div><div class="campaign-metrics"><div class="metric-box"><div class="metric-val">' + c.sent + '</div><div class="metric-lbl">Sent</div></div><div class="metric-box"><div class="metric-val" style="color:var(--color-sky)">' + c.opened + '</div><div class="metric-lbl">Opened</div></div><div class="metric-box"><div class="metric-val" style="color:var(--color-em)">' + c.replied + '</div><div class="metric-lbl">Replied</div></div><div class="metric-box"><div class="metric-val" style="color:var(--color-vio)">' + c.rate + '</div><div class="metric-lbl">Open Rate</div></div></div><div class="campaign-footer"><button class="btn btn-outline btn-xs">&#9998; Edit</button><button class="btn btn-outline btn-xs">&#128202; Stats</button></div></div>'; }).join('');
  return '<div class="mb16"><button class="btn btn-primary" onclick="draftEmails()">&#9993; AI Draft Templates</button></div><div id="draft-out"></div><div class="campaigns-grid">' + cards + '</div>';
}
async function draftEmails() {
  var el = document.getElementById('draft-out'); if (el) el.innerHTML = '<div class="glass-card mb16"><div class="cb loading-row"><span class="spinner-sm"></span>Drafting with Gemini&hellip;</div></div>';
  var cats = S.leads.slice(0, 50).map(function(r) { return getLead(r).category; }).filter(function(c, i, a) { return c && a.indexOf(c) === i; }).slice(0, 4).join(', ');
  var r = await geminiAsync('Draft 2 professional cold outreach B2B email templates for Indian business leads. Industries: ' + (cats || 'general business') + '. Max 120 words each. Include Subject.\n\nTemplate 1:\nSubject: ...\nBody: ...\n\nTemplate 2:\nSubject: ...\nBody: ...', null);
  if (r && el) el.innerHTML = '<div class="glass-card mb16"><div class="card-header-bar"><div class="card-header-title">&#9993; AI Email Templates</div></div><div class="cb"><pre class="email-preview">' + escA(r) + '</pre></div></div>';
}

// ═══════════════════════════════════════════════
//  SETTINGS PAGE
// ═══════════════════════════════════════════════
function pgSettings() {
  return '<div class="settings-layout">'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128273; Gemini API Key</div></div><div class="cb settings-form"><div class="opt-group"><label class="opt-label">API Key (per user)</label><input class="opt-input mono" type="password" id="inp-apikey" value="' + escA(S.apiKey) + '" placeholder="AIzaSy&hellip;"></div><div class="settings-hint">&#128274; Stored in your browser only. Each team member needs their own Gemini key. Get a free key at <a href="https://aistudio.google.com" target="_blank" class="settings-link">aistudio.google.com</a></div><button class="btn btn-primary" onclick="saveKey()">Save API Key</button></div></div>'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128279; Supabase Connection</div><button class="btn btn-outline btn-sm" onclick="navTo(\'setup\')">Manage &rarr;</button></div><div class="cb"><div class="db-status-row"><div class="db-status-dot" style="background:' + (SB.ready ? 'var(--color-em)' : 'var(--color-ro)') + '"></div><div><div style="font-size:14px;font-weight:500">' + (SB.ready ? 'Connected' : 'Not connected') + '</div><div class="mu" style="font-size:12px;font-family:monospace">' + escA(SB.url || 'No URL set') + '</div></div></div></div></div>'
    + '<div class="glass-card"><div class="card-header-bar"><div class="card-header-title">&#128208; Data Management</div></div><div class="cb settings-actions"><button class="btn btn-outline" onclick="exportCSV(S.leads,\'all_leads\')">&#128228; Export All Leads CSV</button><button class="btn btn-outline" onclick="exportSchemaJSON()">&#129518; Export Schema JSON</button><button class="btn btn-danger" onclick="clearLocalOnly()">&#128465; Clear Local Cache</button></div></div>'
    + '</div>';
}
function saveKey() { var v = (document.getElementById('inp-apikey') || {}).value || ''; S.apiKey = v; localStorage.setItem('gemini_key', v); toast(v ? 'API key saved!' : 'Key cleared', 'ok'); }
function clearLocalOnly() { if (!confirm('Clear local cache? DB data is safe.')) return; localStorage.removeItem('lh_config'); S.config = { url: '', pages: '3 pages', depth: 'Standard', jobName: '' }; renderApp(); toast('Local cache cleared', 'ok'); }

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
if (SB.url && SB.key) {
  sbInit(SB.url, SB.key);
  S.page = 'scraper';
  dbLoadAll().then(function() {
    renderApp();
    // Real-time: when any teammate adds leads, refresh
    sbSubscribe('lh_leads', function(payload) {
      if (payload && payload.type === 'INSERT') {
        dbLoadAll().then(function() {
          if (S.page === 'leads') renderLeadsTable();
          updateSyncBadge('ok');
          toast('New leads added by a team member!', 'info');
        });
      }
    });
  });
} else {
  S.page = 'setup';
  renderApp();
}

</script>
</body>
</html>
